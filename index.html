<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiirZ Digital</title>
<link rel="icon" type="image/png" href="assets/icon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f2f4f7; --text: #111827; --text-muted: #6b7280; --orange: #ff8c00; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .scene { display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; padding: 32px; animation: fadeIn 1s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .logo img { height: 64px; filter: drop-shadow(0 0 24px rgba(255,140,0,0.25)); }
  .divider { width: 48px; height: 2px; background: linear-gradient(90deg, transparent, var(--orange), transparent); border-radius: 2px; }
  .headline { font-family: 'Syne', sans-serif; font-size: clamp(1.1rem, 3vw, 1.45rem); font-weight: 400; color: var(--text-muted); max-width: 420px; line-height: 1.6; letter-spacing: 0.01em; }
  .headline strong { color: var(--text); font-weight: 700; }
  .countdown-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .ring { position: relative; width: 56px; height: 56px; }
  .ring svg { transform: rotate(-90deg); width: 56px; height: 56px; }
  .ring .track { fill: none; stroke: rgba(0,0,0,0.08); stroke-width: 3; }
  .ring .progress { fill: none; stroke: var(--orange); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 138.2; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
  .ring .num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--orange); }
  .redirect-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,140,0,0.06) 0%, transparent 70%), radial-gradient(ellipse 50% 35% at 80% 70%, rgba(180,80,255,0.05) 0%, transparent 70%); pointer-events: none; }
</style>
</head>
<body>
<div class="scene">
  <div class="logo"><img src="assets/logo_hires.png" alt="PiirZ Digital"></div>
  <div class="divider"></div>
  <p class="headline">A <strong>fantastic content</strong> will come soon on this area.</p>
  <div class="countdown-wrap">
    <div class="ring">
      <svg viewBox="0 0 56 56">
        <circle class="track" cx="28" cy="28" r="22"/>
        <circle class="progress" cx="28" cy="28" r="22" id="progressRing"/>
      </svg>
      <span class="num" id="countNum">4</span>
    </div>
    <span class="redirect-label">Redirecting to piirz.com</span>
  </div>
</div>
<script>
(function() {
  var total = 4, elapsed = 0;
  var ring = document.getElementById('progressRing');
  var num  = document.getElementById('countNum');
  var circ = 2 * Math.PI * 22;
  ring.style.strokeDashoffset = 0;
  var interval = setInterval(function() {
    elapsed++;
    var remaining = total - elapsed;
    ring.style.strokeDashoffset = (elapsed / total) * circ;
    num.textContent = remaining > 0 ? remaining : 0;
    if (elapsed >= total) { clearInterval(interval); window.location.href = 'https://piirz.com'; }
  }, 1000);
})();
</script>
</body>
</html>
