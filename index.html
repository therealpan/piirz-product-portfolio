<style>
:root {
  --bg:#050608; --surface:#0f1118; --surface2:#161921;
  --border:rgba(255,255,255,0.07); --text:#e8eaf0;
  --text-muted:#6b7280; --text-dim:#9ca3af;
  --orange:#ff8c00; --orange2:#ff6b00;
  --purple:#8b3fdc; --pink:#d4247a;
  --grad:linear-gradient(135deg,#ff8c00,#d4247a,#8b3fdc);
  --grad2:linear-gradient(135deg,#ff6b00,#ff8c00);
  --glow:0 0 40px rgba(255,140,0,0.15);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 20% 10%,rgba(139,63,220,0.08) 0%,transparent 60%),radial-gradient(ellipse 600px 400px at 80% 80%,rgba(255,107,0,0.07) 0%,transparent 60%),radial-gradient(ellipse 400px 400px at 50% 50%,rgba(212,36,122,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:10;padding:28px 48px 0;display:flex;align-items:center;justify-content:space-between;gap:16px;}
a.logo{display:flex;align-items:center;text-decoration:none;}
.logo img{height:48px;filter:drop-shadow(0 0 20px rgba(255,140,0,0.3));transition:filter 0.3s;}
.logo img:hover{filter:drop-shadow(0 0 30px rgba(255,140,0,0.5));}
.header-right{display:flex;align-items:center;gap:12px;}
.home-link{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:rgba(255,255,255,0.03);transition:color 0.2s,border-color 0.2s,background 0.2s;}
.home-link:hover{color:var(--orange);border-color:rgba(255,140,0,0.4);background:rgba(255,140,0,0.06);}
.header-badge{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);border:1px solid var(--border);padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.03);}

/* LANG SELECTOR */
.lang-selector{position:relative;}
.lang-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text-dim);transition:all 0.2s;white-space:nowrap;}
.lang-btn:hover{border-color:rgba(255,140,0,0.4);color:var(--text);background:rgba(255,140,0,0.06);}
.lang-btn .flag{font-size:18px;line-height:1;}
.lang-btn .chevron{font-size:10px;color:var(--text-muted);margin-left:2px;transition:transform 0.2s;}
.lang-selector.open .chevron{transform:rotate(180deg);}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.5);display:none;z-index:200;min-width:160px;}
.lang-selector.open .lang-dropdown{display:block;}
.lang-option{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-dim);transition:background 0.15s,color 0.15s;border-bottom:1px solid var(--border);}
.lang-option:last-child{border-bottom:none;}
.lang-option:hover{background:rgba(255,140,0,0.08);color:var(--text);}
.lang-option.active{color:var(--orange);background:rgba(255,140,0,0.06);}
.lang-option .flag{font-size:18px;}

/* HERO */
.hero{position:relative;z-index:1;text-align:center;padding:60px 48px 44px;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);margin-bottom:20px;opacity:0;animation:fadeUp 0.6s 0.1s ease forwards;}
.hero-tag::before,.hero-tag::after{content:'';height:1px;width:32px;background:var(--grad2);opacity:0.6;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:800;line-height:1.1;letter-spacing:-0.02em;margin-bottom:16px;opacity:0;animation:fadeUp 0.6s 0.2s ease forwards;}
.hero h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:1.05rem;color:var(--text-muted);font-weight:300;max-width:560px;margin:0 auto;line-height:1.7;opacity:0;animation:fadeUp 0.6s 0.3s ease forwards;}

/* SEARCH */
.search-wrap{position:relative;z-index:20;max-width:620px;margin:36px auto 0;opacity:0;animation:fadeUp 0.6s 0.4s ease forwards;}
.search-box{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:14px 20px;gap:12px;transition:border-color 0.3s,box-shadow 0.3s;}
.search-box:focus-within{border-color:rgba(255,140,0,0.5);box-shadow:0 0 0 3px rgba(255,140,0,0.08),var(--glow);}
.search-box i{color:var(--orange);font-size:15px;flex-shrink:0;}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;}
.search-box input::placeholder{color:var(--text-muted);}
.search-clear{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:50%;display:none;transition:color 0.2s;font-size:13px;}
.search-clear:hover{color:var(--text);}
.search-clear.visible{display:block;}
.autocomplete{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.5);display:none;z-index:100;}
.autocomplete.open{display:block;}
.ac-item{padding:12px 18px;cursor:pointer;font-size:0.88rem;color:var(--text-dim);display:flex;align-items:center;gap:10px;transition:background 0.15s,color 0.15s;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.active{background:rgba(255,140,0,0.08);color:var(--text);}
.ac-item i{color:var(--orange);font-size:12px;width:14px;}
.ac-item .hl{color:var(--orange);font-weight:600;}

/* FILTERS */
.filters-section{position:relative;z-index:5;padding:28px 48px 0;opacity:0;animation:fadeUp 0.6s 0.5s ease forwards;}
.filters-label{font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}
.filter-groups{display:flex;flex-wrap:wrap;gap:20px;}
.filter-group{display:flex;flex-direction:column;gap:8px;}
.filter-group-label{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);opacity:0.6;}
.filter-chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text-muted);cursor:pointer;transition:all 0.2s ease;white-space:nowrap;user-select:none;}
.chip i{font-size:10px;}
.chip:hover{border-color:rgba(255,140,0,0.4);color:var(--text);background:rgba(255,140,0,0.06);transform:translateY(-1px);}
.chip.active{background:rgba(255,140,0,0.15);border-color:var(--orange);color:var(--orange);box-shadow:0 0 12px rgba(255,140,0,0.15);}
.chip-all.active{background:var(--grad2);border-color:transparent;color:white;box-shadow:0 4px 16px rgba(255,107,0,0.3);}

/* FILTER ACTIONS */
.filter-actions{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;position:relative;z-index:5;}
.results-count{font-size:13px;color:var(--text-muted);}
.results-count strong{color:var(--orange);}
.btn-reset{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
.btn-reset:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}

/* DIVIDER */
.section-divider{position:relative;z-index:5;padding:0 48px 22px;display:flex;align-items:center;gap:16px;}
.section-divider span{font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* GRID */
.grid-section{position:relative;z-index:1;padding:8px 48px 60px;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:border-color 0.3s,transform 0.3s,box-shadow 0.3s;position:relative;overflow:hidden;animation:cardIn 0.4s ease both;}
.card::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity 0.3s;pointer-events:none;border-radius:inherit;}
.card:hover{border-color:rgba(255,140,0,0.35);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 30px rgba(255,140,0,0.08);}
.card:hover::before{opacity:0.03;}
.card.hidden{display:none;}
.card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
.card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.card-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;}
.card-category{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);}
.card-desc{font-size:0.84rem;color:var(--text-muted);line-height:1.65;margin-bottom:16px;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border);}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
.card-email,.card-detail-btn,.card-attach-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-muted);text-decoration:none;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:color 0.2s,border-color 0.2s,background 0.2s;font-family:'DM Sans',sans-serif;}
.card-email:hover,.card-detail-btn:hover,.card-attach-btn:hover{color:var(--orange);border-color:rgba(255,140,0,0.45);background:rgba(255,140,0,0.07);}
.card-email i,.card-detail-btn i,.card-attach-btn i{font-size:11px;}
.card-attach-btn{color:var(--purple);border-color:rgba(139,63,220,0.25);}
.card-attach-btn:hover{color:var(--purple);border-color:rgba(139,63,220,0.5);background:rgba(139,63,220,0.07);}
.ic-orange{background:rgba(255,140,0,0.12);color:#ff8c00;}
.ic-purple{background:rgba(139,63,220,0.12);color:#a855f7;}
.ic-pink{background:rgba(212,36,122,0.12);color:#ec4899;}
.ic-blue{background:rgba(59,130,246,0.12);color:#60a5fa;}
.ic-green{background:rgba(34,197,94,0.12);color:#4ade80;}
.ic-teal{background:rgba(20,184,166,0.12);color:#2dd4bf;}
.ic-red{background:rgba(239,68,68,0.12);color:#f87171;}
.ic-yellow{background:rgba(234,179,8,0.12);color:#facc15;}

/* EMPTY */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 24px;display:none;}
.empty-state.show{display:block;}
.empty-state i{font-size:48px;color:var(--border);margin-bottom:16px;display:block;}
.empty-state h3{font-family:'Syne',sans-serif;font-size:1.2rem;margin-bottom:8px;}
.empty-state p{color:var(--text-muted);font-size:0.9rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px;border-radius:8px;transition:color 0.2s,background 0.2s;}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,0.06);}
.modal-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.modal-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;}
.modal-cat{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);}
.modal-desc{font-size:0.9rem;color:var(--text-dim);line-height:1.7;margin-bottom:20px;}
.modal-section-title{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:var(--orange);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.1em;}
.modal-details{font-size:0.88rem;color:var(--text-dim);line-height:1.7;margin-bottom:24px;}
.modal-details a{color:var(--orange);text-decoration:none;}
.modal-details a:hover{text-decoration:underline;}
.modal-details img{max-width:100%;border-radius:8px;margin:12px 0;}
.modal-attachments{margin-bottom:16px;}
.attach-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:border-color 0.2s,background 0.2s;text-decoration:none;color:var(--text);}
.attach-item:hover{border-color:rgba(139,63,220,0.4);background:rgba(139,63,220,0.05);}
.attach-icon{width:36px;height:36px;border-radius:8px;background:rgba(139,63,220,0.12);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.attach-name{font-weight:600;font-size:0.85rem;}
.attach-meta{font-size:11px;color:var(--text-muted);}
.modal-cta{display:inline-flex;align-items:center;gap:8px;background:var(--grad2);color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;text-decoration:none;padding:10px 22px;border-radius:24px;transition:box-shadow 0.2s;margin-top:8px;}
.modal-cta:hover{box-shadow:0 4px 20px rgba(255,107,0,0.4);}

/* CTA */
.cta-contact{text-align:center;padding:20px 48px 0;opacity:0;animation:fadeUp 0.6s 0.45s ease forwards;}
.cta-contact-inner{display:inline-flex;align-items:center;gap:10px;background:rgba(255,140,0,0.06);border:1px solid rgba(255,140,0,0.18);border-radius:40px;padding:10px 20px 10px 14px;transition:background 0.3s,border-color 0.3s;}
.cta-contact-inner:hover{background:rgba(255,140,0,0.1);border-color:rgba(255,140,0,0.35);}
.cta-contact-icon{width:30px;height:30px;border-radius:50%;background:rgba(255,140,0,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--orange);flex-shrink:0;}
.cta-contact-text{font-size:0.82rem;color:var(--text-muted);line-height:1.4;}
.cta-contact-text a{color:var(--orange);text-decoration:none;font-weight:600;}
.cta-contact-text a:hover{text-decoration:underline;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

@media(max-width:768px){
  header,.filters-section,.filter-actions,.grid-section,.section-divider{padding-left:20px;padding-right:20px;}
  .hero{padding:44px 20px 28px;}
  .products-grid{grid-template-columns:1fr;}
  .filter-groups{gap:14px;}
  .header-badge{display:none;}
  .modal{padding:20px;margin:12px;}
}
@media(max-width:600px){.cta-contact{padding-left:20px;padding-right:20px;}}

/* ── Skip to content ── */
.skip-link{position:absolute;top:-120px;left:16px;z-index:9999;background:var(--orange);color:#fff;padding:8px 18px;border-radius:8px;font-weight:700;font-size:13px;text-decoration:none;transition:top 0.15s;}
.skip-link:focus{top:16px;}

/* ── Skeleton loader ── */
.skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;}
.skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);height:194px;position:relative;overflow:hidden;}
.skeleton-card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,0.04) 50%,transparent 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── .modal-details inner elements ── */
.modal-details h4{font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);margin:1.4rem 0 0.5rem;padding-bottom:4px;}
.modal-details h4.exclusion-label{color:#f59e0b;}
.modal-details h4.exclusion-label::before{content:'⚠  ';}
.modal-details ul{list-style:none;padding-left:0;margin:0.3rem 0 0.8rem;}
.modal-details li{position:relative;padding-left:1.2rem;margin-bottom:0.55rem;line-height:1.6;}
.modal-details li::before{content:'–';position:absolute;left:0;color:var(--orange);font-weight:700;}
.modal-details li strong{color:var(--text);font-weight:700;}
.modal-details p.lead{font-size:0.93rem;line-height:1.75;color:var(--text-dim);margin-bottom:1.1rem;border-left:2px solid rgba(255,140,0,0.3);padding-left:14px;}

/* ── Modal open animation ── */
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(0.97);}to{opacity:1;transform:none;}}
.modal-overlay.open .modal{animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1) forwards;}

/* ── Modal header: sticky ── */
.modal-header{display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;background:var(--surface);padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:0;}
.modal-body-start{margin-top:18px;}

/* ── Chip as button reset ── */
.chip{font-family:inherit;font-size:12px;}

/* ── Section divider subtitle ── */
.section-divider>span{display:flex;flex-direction:column;align-items:center;gap:3px;}
.div-sub{font-family:'DM Sans',sans-serif;font-size:0.67rem;font-weight:400;letter-spacing:0.04em;text-transform:none;color:var(--text-muted);opacity:0.55;white-space:nowrap;}

/* ── Footer ── */
.site-footer{position:relative;z-index:5;border-top:1px solid var(--border);padding:22px 48px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:24px;}
.footer-links{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.footer-links a{font-size:12px;color:var(--text-muted);text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:var(--text);}
.footer-copy{font-size:11px;color:var(--text-muted);opacity:0.55;}
@media(max-width:768px){
  .skeleton-grid{grid-template-columns:1fr;}
  .site-footer{flex-direction:column;text-align:center;padding:20px;}
}

/* ── Theme Toggle Button ── */
.theme-toggle{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);cursor:pointer;color:var(--text-muted);font-size:14px;transition:all 0.2s;flex-shrink:0;}
.theme-toggle:hover{border-color:rgba(255,140,0,0.4);color:var(--orange);background:rgba(255,140,0,0.06);}

/* ── Card hover activates Dettagli button ── */
.card:hover .card-detail-btn{color:var(--orange);border-color:rgba(255,140,0,0.45);background:rgba(255,140,0,0.07);}

/* ── LIGHT THEME ─────────────────────────────────── */
[data-theme="light"]{
  --bg:#f2f4f7;
  --surface:#ffffff;
  --surface2:#eaecf0;
  --border:rgba(0,0,0,0.09);
  --text:#111827;
  --text-muted:#6b7280;
  --text-dim:#374151;
  --glow:0 0 40px rgba(255,140,0,0.10);
}
[data-theme="light"] body{background:var(--bg);color:var(--text);}
[data-theme="light"] body::before{background:radial-gradient(ellipse 800px 600px at 20% 10%,rgba(139,63,220,0.04) 0%,transparent 60%),radial-gradient(ellipse 600px 400px at 80% 80%,rgba(255,107,0,0.04) 0%,transparent 60%),radial-gradient(ellipse 400px 400px at 50% 50%,rgba(212,36,122,0.02) 0%,transparent 60%);}
[data-theme="light"] .header-badge{background:rgba(0,0,0,0.03);}
[data-theme="light"] .lang-btn{background:rgba(0,0,0,0.04);}
[data-theme="light"] .lang-dropdown,[data-theme="light"] .autocomplete{box-shadow:0 8px 30px rgba(0,0,0,0.12);}
[data-theme="light"] .card{box-shadow:0 1px 4px rgba(0,0,0,0.06),0 2px 10px rgba(0,0,0,0.04);}
[data-theme="light"] .card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.11),0 0 24px rgba(255,140,0,0.07);}
[data-theme="light"] .tag{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.09);}
[data-theme="light"] .modal{box-shadow:0 20px 60px rgba(0,0,0,0.14);}
[data-theme="light"] .modal-overlay{background:rgba(0,0,0,0.45);}
[data-theme="light"] .modal-close:hover{background:rgba(0,0,0,0.05);}
[data-theme="light"] .modal-header{background:var(--surface);}
[data-theme="light"] .attach-item{background:rgba(0,0,0,0.025);}
[data-theme="light"] .skeleton-card::after{background:linear-gradient(90deg,transparent 25%,rgba(0,0,0,0.04) 50%,transparent 75%);background-size:200% 100%;}
[data-theme="light"] ::-webkit-scrollbar-track{background:var(--bg);}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);}
[data-theme="light"] .theme-toggle{background:rgba(0,0,0,0.04);}
</style>
</head>

<script>
(function(){

/* ══════════════════════════════════════════════════
   CONFIG — Change API_BASE when deploying Worker
   ══════════════════════════════════════════════════ */
var API_BASE = 'https://piirz-portfolio-api.piirz.workers.dev';

/* ══════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════ */
var DB = null;
var currentLang = 'it';
var activeFilters = { category: 'all' };
var searchQuery = '';
var suggestions = [];
var acIdx = -1;

/* ══════════════════════════════════════════════════
   LOAD DATA
   ══════════════════════════════════════════════════ */
function initDB(data) {
  DB = data;
  document.getElementById('loadingSkeleton').style.display = 'none';
  buildFilters();
  renderCards();
  applyLang(detectBrowserLang());
  // Deep link: open modal if URL has #productKey
  var hash = location.hash.slice(1);
  if (hash && getProduct(hash)) openModal(hash, 'details');
}

fetch(API_BASE + '/api/products')
  .then(function(r){ if (!r.ok) throw new Error('API ' + r.status); return r.json(); })
  .then(function(data){ initDB(data); })
  .catch(function(){
    fetch('data/products.json')
      .then(function(r){ return r.json(); })
      .then(function(data){ initDB(data); })
      .catch(function(e){
        console.error('Failed to load products:', e);
        document.getElementById('loadingSkeleton').style.display = 'none';
      });
  });

/* ══════════════════════════════════════════════════
   LANGUAGE
   ══════════════════════════════════════════════════ */
function detectBrowserLang() {
  var nav = navigator.language || navigator.userLanguage || 'it';
  var code = nav.split('-')[0].toLowerCase();
  return DB.ui[code] ? code : 'it';
}

function applyLang(code) {
  currentLang = code;
  var T = DB.ui[code];
  document.documentElement.lang = code;

  // Header
  document.getElementById('currentFlag').innerHTML = T.flag;
  document.getElementById('currentLangName').textContent = T.name;
  document.getElementById('badge').textContent = T.badge;
  document.querySelectorAll('.lang-option').forEach(function(opt){
    opt.classList.toggle('active', opt.dataset.lang === code);
  });

  // Hero
  document.getElementById('heroTag').innerHTML = T.heroTag;
  document.getElementById('heroTitle').innerHTML = T.heroTitle;
  document.getElementById('heroDesc').innerHTML = T.heroDesc;
  document.getElementById('searchInput').placeholder = T.searchPlaceholder;

  // CTA
  document.getElementById('ctaText').textContent = T.ctaContactText;
  document.getElementById('ctaLink').textContent = T.ctaContactLink;

  // Filters
  document.getElementById('filterByLabel').textContent = T.filterBy;
  document.getElementById('filterCatLabel').textContent = T.filterCategory;
  document.getElementById('filterSecLabel').textContent = T.filterSector;
  document.getElementById('filterTechLabel').textContent = T.filterTech;
  document.getElementById('showingLabel').textContent = T.showing;
  document.getElementById('solutionsLabel').textContent = T.solutions;
  document.getElementById('resetLabel').textContent = T.resetFilters;

  // Filter chip labels
  document.querySelectorAll('.chip[data-i18n]').forEach(function(chip){
    var label = chip.querySelector('.chip-label');
    if (label && T[chip.dataset.i18n]) label.textContent = T[chip.dataset.i18n];
  });

  // Dividers
  document.getElementById('divExisting').textContent = T.divExisting;
  document.getElementById('divCapabilities').textContent = T.divCapabilities;

  // Divider subtitles (i18n)
  var divSubs = {
    it: { existing: 'Soluzioni già disponibili e deployabili', capabilities: 'Competenze attivabili su progetto' },
    en: { existing: 'Ready-to-deploy solutions', capabilities: 'Project-activatable capabilities' },
    fr: { existing: 'Solutions disponibles et déployables', capabilities: 'Compétences activables sur projet' },
    de: { existing: 'Sofort einsetzbare Lösungen', capabilities: 'Projektbezogene Fähigkeiten' },
    es: { existing: 'Soluciones disponibles para desplegar', capabilities: 'Capacidades activables por proyecto' }
  };
  var ds = divSubs[code] || divSubs.it;
  var subEx = document.getElementById('divExistingSub');
  var subCap = document.getElementById('divCapabilitiesSub');
  if (subEx) subEx.textContent = ds.existing;
  if (subCap) subCap.textContent = ds.capabilities;

  // Empty state
  document.getElementById('emptyTitle').textContent = T.emptyTitle;
  document.getElementById('emptyDesc').textContent = T.emptyDesc;

  // Cards — update translated fields
  document.querySelectorAll('.card[data-key]').forEach(function(card){
    var p = getProduct(card.dataset.key);
    if (!p) return;
    card.querySelector('.card-name').textContent = p.name[code] || p.name.en;
    card.querySelector('.card-category').textContent = p.category[code] || p.category.en;
    card.querySelector('.card-desc').textContent = p.description[code] || p.description.en;
    // Email link
    var emailLink = card.querySelector('.card-email');
    if (emailLink) {
      var subject = encodeURIComponent(T.emailSubjectPrefix + ' ' + (p.name[code] || p.name.en));
      emailLink.href = 'mailto:hello@piirz.com?subject=' + subject;
      emailLink.querySelector('.btn-label').textContent = T.emailLabel;
    }
    // Detail btn
    var detBtn = card.querySelector('.card-detail-btn .btn-label');
    if (detBtn) detBtn.textContent = T.detailLabel || 'Dettagli';
    // Attach btn
    var attBtn = card.querySelector('.card-attach-btn');
    if (attBtn) {
      attBtn.querySelector('.btn-label').textContent = T.attachLabel || 'Allegati';
      attBtn.style.display = (p.attachments && p.attachments.length > 0) ? 'inline-flex' : 'none';
    }
  });

  buildSuggestions();
  filterCards();
}

function getProduct(key) {
  if (!DB) return null;
  return DB.products.find(function(p){ return p.key === key; });
}

/* ══════════════════════════════════════════════════
   BUILD FILTER CHIPS
   ══════════════════════════════════════════════════ */
function buildFilters() {
  var catChips = [
    { filter:'all', icon:'fa-border-all', i18n:'filterAll', cls:'chip-all active' },
    { filter:'piattaforma', icon:'fa-server', i18n:'filterPlatforms' },
    { filter:'consulenza', icon:'fa-chess', i18n:'filterConsulting' },
    { filter:'prodotto', icon:'fa-box', i18n:'filterProducts' },
    { filter:'sicurezza', icon:'fa-shield', i18n:'filterSecurity' },
    { filter:'formazione', icon:'fa-graduation-cap', i18n:'filterTraining' },
    { filter:'capacita', icon:'fa-wand-magic-sparkles', i18n:'filterCapabilities' }
  ];
  var secChips = [
    { filter:'turismo', icon:'fa-plane', i18n:'secTourism' },
    { filter:'cultura', icon:'fa-landmark', i18n:'secCulture' },
    { filter:'enterprise', icon:'fa-building', i18n:'secEnterprise', label:'Enterprise' },
    { filter:'sanita', icon:'fa-heart-pulse', i18n:'secHealth' },
    { filter:'finance', icon:'fa-coins', i18n:'secFinance', label:'Finance' },
    { filter:'retail', icon:'fa-store', i18n:'secRetail', label:'Retail' },
    { filter:'pubblica-amministrazione', icon:'fa-building-columns', i18n:'secPA' },
    { filter:'immobiliare', icon:'fa-house', i18n:'secRealEstate' }
  ];
  var techChips = [
    { filter:'llm', icon:'fa-brain', label:'LLM' },
    { filter:'computer-vision', icon:'fa-eye', label:'Computer Vision' },
    { filter:'ml', icon:'fa-chart-line', label:'ML' },
    { filter:'xr', icon:'fa-vr-cardboard', label:'XR / AR / VR' },
    { filter:'agenti', icon:'fa-robot', label:'AI Agents' },
    { filter:'rag', icon:'fa-database', label:'RAG' },
    { filter:'avatar', icon:'fa-user-astronaut', label:'Avatar AI' },
    { filter:'voce', icon:'fa-microphone', i18n:'techVoice' }
  ];

  renderChipGroup('categoryChips', catChips, 'category');
  renderChipGroup('sectorChips', secChips, 'sector');
  renderChipGroup('techChips', techChips, 'tech');
}

function renderChipGroup(containerId, chips, type) {
  var container = document.getElementById(containerId);
  container.innerHTML = chips.map(function(c){
    var cls = 'chip ' + (c.cls || '');
    var isActive = (c.cls && c.cls.indexOf('active') >= 0) ? 'true' : 'false';
    return '<button type="button" class="' + cls.trim() + '" data-filter="' + c.filter + '" data-type="' + type + '"' +
      (c.i18n ? ' data-i18n="' + c.i18n + '"' : '') +
      ' aria-pressed="' + isActive + '"' +
      '><i class="fa-solid ' + c.icon + '"></i> <span class="chip-label">' + (c.label || '') + '</span></button>';
  }).join('');
}

/* ══════════════════════════════════════════════════
   RENDER CARDS FROM DATA
   ══════════════════════════════════════════════════ */
function renderCards() {
  var grid1 = document.getElementById('grid1');
  var grid2 = document.getElementById('grid2');
  grid1.innerHTML = '';
  grid2.innerHTML = '';

  DB.products.forEach(function(p, i){
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.tags = p.tags.join(',');
    card.dataset.key = p.key;
    card.style.animationDelay = (i * 0.04) + 's';

    var hasDetails = p.details && Object.values(p.details).some(function(d){ return d && d.html; });
    var hasAttach = p.attachments && p.attachments.length > 0;

    card.innerHTML =
      '<div class="card-header">' +
        '<div class="card-icon ic-' + p.iconColor + '"><i class="' + p.icon + '"></i></div>' +
        '<div><div class="card-name">' + (p.name.it || '') + '</div>' +
        '<div class="card-category">' + (p.category.it || '') + '</div></div>' +
      '</div>' +
      '<p class="card-desc">' + (p.description.it || '') + '</p>' +
      '<div class="card-tags">' + p.techTags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
      '<div class="card-footer">' +
        '<a class="card-email" href="#"><i class="fa-regular fa-envelope"></i> <span class="btn-label"></span></a>' +
        (hasDetails || true ? '<button class="card-detail-btn" data-key="' + p.key + '"><i class="fa-solid fa-circle-info"></i> <span class="btn-label">Dettagli</span></button>' : '') +
        '<button class="card-attach-btn" data-key="' + p.key + '" style="display:' + (hasAttach ? 'inline-flex' : 'none') + '"><i class="fa-solid fa-paperclip"></i> <span class="btn-label">Allegati</span></button>' +
      '</div>';

    if (p.section === 'existing') grid1.appendChild(card);
    else grid2.appendChild(card);
  });

  // Add empty state to grid1
  var empty = document.getElementById('emptyState');
  grid1.appendChild(empty);

  // Bind detail/attach buttons
  document.querySelectorAll('.card-detail-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ openModal(btn.dataset.key, 'details'); });
  });
  document.querySelectorAll('.card-attach-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ openModal(btn.dataset.key, 'attachments'); });
  });
}

/* ══════════════════════════════════════════════════
   MODAL
   ══════════════════════════════════════════════════ */
function openModal(key, focus) {
  var p = getProduct(key);
  if (!p) return;
  var T = DB.ui[currentLang];
  var overlay = document.getElementById('modalOverlay');

  // Log event
  logEvent('detail_view', key);

  // Header
  document.getElementById('modalIcon').className = 'card-icon ic-' + p.iconColor;
  document.getElementById('modalIcon').innerHTML = '<i class="' + p.icon + '"></i>';
  document.getElementById('modalTitle').textContent = p.name[currentLang] || p.name.en;
  document.getElementById('modalCat').textContent = p.category[currentLang] || p.category.en;

  // Details — try current lang, fallback to 'it'
  var detSection = document.getElementById('modalDetailsSection');
  var det = p.details && (p.details[currentLang] || p.details['it']);
  var hasDetails = det && det.html;

  // Show short description only when no details available
  var descEl = document.getElementById('modalDesc');
  descEl.textContent = p.description[currentLang] || p.description.en;
  descEl.style.display = hasDetails ? 'none' : 'block';

  if (hasDetails) {
    document.getElementById('modalDetailsLabel').textContent = T.detailLabel || 'Dettagli';
    document.getElementById('modalDetails').innerHTML = det.html;
    // Mark last h4 as exclusion section (affordance warning)
    var h4s = document.querySelectorAll('#modalDetails h4');
    h4s.forEach(function(h){ h.classList.remove('exclusion-label'); });
    if (h4s.length > 0) h4s[h4s.length - 1].classList.add('exclusion-label');
    detSection.style.display = 'block';
  } else {
    detSection.style.display = 'none';
  }

  // Attachments
  var attSection = document.getElementById('modalAttachSection');
  if (p.attachments && p.attachments.length > 0) {
    document.getElementById('modalAttachLabel').textContent = T.attachLabel || 'Allegati';
    var attHtml = p.attachments.map(function(att){
      var mime = (att.type || '').toLowerCase();
      var icon = mime.includes('pdf') ? 'fa-file-pdf'
               : (mime.includes('presentation') || mime.includes('powerpoint') || att.name.match(/\.pptx?$/i)) ? 'fa-file-powerpoint'
               : (mime.includes('word') || att.name.match(/\.docx?$/i)) ? 'fa-file-word'
               : (mime.includes('sheet') || mime.includes('excel') || att.name.match(/\.xlsx?$/i)) ? 'fa-file-excel'
               : mime.includes('image') ? 'fa-file-image'
               : 'fa-file';
      var size = att.size ? (att.size / 1024 < 1024 ? (att.size/1024).toFixed(0) + ' KB' : (att.size/1048576).toFixed(1) + ' MB') : '';
      var label = att.name.split('.').pop().toUpperCase();
      return '<a class="attach-item" href="' + (att.url || att.file || '#') + '" target="_blank" data-key="' + key + '" data-att="' + (att.key || att.id || att.name) + '">' +
        '<div class="attach-icon"><i class="fa-solid ' + icon + '"></i></div>' +
        '<div><div class="attach-name">' + att.name + '</div><div class="attach-meta">' + label + (size ? ' · ' + size : '') + '</div></div>' +
      '</a>';
    }).join('');
    document.getElementById('modalAttachments').innerHTML = attHtml;
    attSection.style.display = 'block';

    // Log attachment downloads
    document.querySelectorAll('#modalAttachments .attach-item').forEach(function(item){
      item.addEventListener('click', function(){ logEvent('attachment_download', item.dataset.key, item.dataset.att); });
    });
  } else {
    attSection.style.display = 'none';
  }

  // CTA
  var subject = encodeURIComponent((T.emailSubjectPrefix || 'Info') + ' ' + (p.name[currentLang] || p.name.en));
  document.getElementById('modalCta').href = 'mailto:hello@piirz.com?subject=' + subject;
  document.getElementById('modalCtaLabel').textContent = T.emailLabel || 'Richiedi info';

  // Update URL hash for deep linking
  history.replaceState(null, '', '#' + key);

  // Reset modal scroll position
  document.querySelector('.modal').scrollTop = 0;

  overlay.classList.add('open');

  // Scroll to focus section
  if (focus === 'attachments' && attSection.style.display === 'block') {
    setTimeout(function(){ attSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 120);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  history.replaceState(null, '', location.pathname + location.search);
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e){ if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════════════════════
   EVENT LOGGING
   ══════════════════════════════════════════════════ */
function logEvent(type, productKey, extra) {
  if (!API_BASE) return; // No API configured, skip
  var payload = { event: type, product: productKey, lang: currentLang, ts: new Date().toISOString() };
  if (extra) payload.extra = extra;
  try {
    navigator.sendBeacon(API_BASE + '/api/log', JSON.stringify(payload));
  } catch(e) {
    // Silently fail
  }
}

/* ══════════════════════════════════════════════════
   SEARCH & FILTER
   ══════════════════════════════════════════════════ */
var searchInput = document.getElementById('searchInput');
var searchClear = document.getElementById('searchClear');
var ac = document.getElementById('autocomplete');
var countNum = document.getElementById('countNum');

function buildSuggestions() {
  suggestions = [];
  document.querySelectorAll('.card[data-key]').forEach(function(card){
    var name = card.querySelector('.card-name').textContent.trim();
    if (name && !suggestions.find(function(s){ return s.text === name; })) {
      suggestions.push({ text: name, icon: 'fa-box' });
    }
    card.querySelectorAll('.tag').forEach(function(tag){
      var t = tag.textContent.trim();
      if (t && !suggestions.find(function(s){ return s.text === t; })) {
        suggestions.push({ text: t, icon: 'fa-tag' });
      }
    });
  });
}

function filterCards() {
  var q = searchQuery.toLowerCase();
  var visible = 0;
  var delay = 0;
  document.querySelectorAll('.card[data-key]').forEach(function(card){
    var tags = card.dataset.tags;
    var name = card.querySelector('.card-name').textContent.toLowerCase();
    var desc = card.querySelector('.card-desc').textContent.toLowerCase();
    var tagTexts = Array.from(card.querySelectorAll('.tag')).map(function(t){ return t.textContent.toLowerCase(); }).join(' ');
    var full = name + ' ' + desc + ' ' + tags + ' ' + tagTexts;
    var show = true;
    if (activeFilters.category && activeFilters.category !== 'all') show = tags.split(',').indexOf(activeFilters.category) >= 0;
    if (show && activeFilters.sector) show = tags.split(',').indexOf(activeFilters.sector) >= 0;
    if (show && activeFilters.tech) show = tags.split(',').indexOf(activeFilters.tech) >= 0;
    if (show && q) show = full.indexOf(q) >= 0;
    if (show) { card.classList.remove('hidden'); card.style.animationDelay = (delay*0.04)+'s'; visible++; delay++; }
    else card.classList.add('hidden');
  });
  countNum.textContent = visible;
  var emptyEl = document.getElementById('emptyState');
  emptyEl.style.display = visible === 0 ? 'block' : 'none';
}

function highlight(text, q) {
  var idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.substring(0, idx) + '<span class="hl">' + text.substring(idx, idx + q.length) + '</span>' + text.substring(idx + q.length);
}

function showAC(q) {
  if (!q) { hideAC(); return; }
  var matches = suggestions.filter(function(s){ return s.text.toLowerCase().indexOf(q.toLowerCase()) >= 0; }).slice(0,7);
  if (!matches.length) { hideAC(); return; }
  ac.innerHTML = matches.map(function(s,i){
    return '<div class="ac-item" data-idx="'+i+'" data-text="'+s.text+'"><i class="fa-solid '+s.icon+'"></i>'+highlight(s.text,q)+'</div>';
  }).join('');
  Array.from(ac.querySelectorAll('.ac-item')).forEach(function(item){
    item.addEventListener('mousedown',function(e){
      e.preventDefault();
      searchInput.value=item.dataset.text; searchQuery=item.dataset.text;
      searchClear.classList.add('visible'); hideAC(); filterCards();
    });
  });
  ac.classList.add('open'); acIdx=-1;
}

function hideAC() { ac.classList.remove('open'); acIdx=-1; }

searchInput.addEventListener('input', function(){
  searchQuery=searchInput.value.trim();
  searchClear.classList.toggle('visible', searchQuery.length>0);
  showAC(searchQuery); filterCards();
});
searchClear.addEventListener('click', function(){
  searchInput.value=''; searchQuery=''; searchClear.classList.remove('visible'); hideAC(); filterCards();
});
searchInput.addEventListener('keydown', function(e){
  var items=Array.from(ac.querySelectorAll('.ac-item'));
  if(e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,items.length-1);items.forEach(function(it,i){it.classList.toggle('active',i===acIdx);});e.preventDefault();}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,-1);items.forEach(function(it,i){it.classList.toggle('active',i===acIdx);});e.preventDefault();}
  else if(e.key==='Enter'&&acIdx>=0&&items[acIdx]){searchInput.value=items[acIdx].dataset.text;searchQuery=items[acIdx].dataset.text;searchClear.classList.add('visible');hideAC();filterCards();}
  else if(e.key==='Escape') hideAC();
});
document.addEventListener('click', function(e){ if(!e.target.closest('.search-wrap')) hideAC(); });

/* ══════════════════════════════════════════════════
   CHIP CLICK HANDLERS (delegated)
   ══════════════════════════════════════════════════ */
document.querySelector('.filter-groups').addEventListener('click', function(e){
  var chip = e.target.closest('.chip');
  if (!chip) return;
  var type = chip.dataset.type;
  var filter = chip.dataset.filter;
  var allChips = Array.from(document.querySelectorAll('.chip'));

  if (filter === 'all') {
    activeFilters = { category: 'all' };
    allChips.forEach(function(c){ c.classList.remove('active'); });
    chip.classList.add('active');
  } else {
    document.querySelector('.chip-all').classList.remove('active');
    if (activeFilters[type] === filter) {
      delete activeFilters[type]; chip.classList.remove('active');
      if (!activeFilters.category && !activeFilters.sector && !activeFilters.tech) {
        activeFilters.category = 'all';
        document.querySelector('.chip-all').classList.add('active');
      }
    } else {
      document.querySelectorAll('.chip[data-type="'+type+'"]').forEach(function(c){ c.classList.remove('active'); });
      activeFilters[type] = filter; chip.classList.add('active');
    }
  }
  filterCards();
  // Sync aria-pressed for all chips after state change
  document.querySelectorAll('.chip').forEach(function(c){
    c.setAttribute('aria-pressed', c.classList.contains('active') ? 'true' : 'false');
  });
});

document.getElementById('btnReset').addEventListener('click', function(){
  activeFilters = { category: 'all' };
  document.querySelectorAll('.chip').forEach(function(c){
    c.classList.remove('active');
    c.setAttribute('aria-pressed', 'false');
  });
  var chipAll = document.querySelector('.chip-all');
  chipAll.classList.add('active');
  chipAll.setAttribute('aria-pressed', 'true');
  searchInput.value = ''; searchQuery = ''; searchClear.classList.remove('visible'); hideAC(); filterCards();
});

/* ══════════════════════════════════════════════════
   LANG SELECTOR
   ══════════════════════════════════════════════════ */
var langSelector = document.getElementById('langSelector');
document.getElementById('langBtn').addEventListener('click', function(e){

});
document.querySelectorAll('.lang-option').forEach(function(opt){
  opt.addEventListener('click', function(){ applyLang(opt.dataset.lang); langSelector.classList.remove('open'); });

    if (card) logEvent('info_request', card.dataset.key);

/* ══════════════════════════════════════════════════
   THEME TOGGLE (light / dark)
   ══════════════════════════════════════════════════ */
(function(){
  var html = document.documentElement;
  var toggleBtn = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  var logoImg = document.querySelector('.logo img');

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    icon.className = theme === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    if (logoImg) logoImg.src = theme === 'light' ? 'assets/logo_hires.png' : 'assets/logo.png';
    try { localStorage.setItem('piirz-theme', theme); } catch(e) {}
  }

  // Init: prefer saved preference, default = light
  var saved = 'light';
  try { saved = localStorage.getItem('piirz-theme') || 'light'; } catch(e) {}
  applyTheme(saved);

  toggleBtn.addEventListener('click', function(){
    var current = html.getAttribute('data-theme') || 'light';
    applyTheme(current === 'light' ? 'dark' : 'light');
  });
})();

})();
</script>
